<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RP AI — Sistem Mimarisi</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Inter:wght@300;400;500;600;700&display=swap');

* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg: #0d0d1a;
  --bg2: #141428;
  --bg3: #1c1c38;
  --bg4: #252550;
  --text: #e0e0f0;
  --text2: #a0a0c0;
  --text3: #707090;
  --border: #2a2a50;
  --red: #bc0033;
  --red2: #e63946;
  --gold: #c8962e;
  --gold2: #e8b84a;
  --purple: #7b2d8e;
  --sidebar-w: 280px;
  --header-h: 56px;
}

html { scroll-behavior: smooth; }

body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.7;
  display: flex;
  min-height: 100vh;
}

/* HEADER */
.header {
  position: fixed;
  top:0; left:0; right:0;
  height: var(--header-h);
  background: rgba(13,13,26,0.95);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  z-index: 100;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo {
  font-family: 'Noto Sans JP', sans-serif;
  font-weight: 900;
  font-size: 18px;
  color: var(--red);
}

.logo span { color: var(--text); font-weight:300; font-size:13px; font-family:'Inter',sans-serif; }

.lang-switch {
  display: flex;
  background: var(--bg3);
  border-radius: 6px;
  padding: 2px;
  border: 1px solid var(--border);
}

.lang-btn {
  font-family: 'Noto Sans JP', sans-serif;
  padding: 4px 12px;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 600;
  background: transparent;
  color: var(--text3);
  transition: all 0.2s;
}

.lang-btn.active {
  background: var(--red);
  color: #fff;
}

/* SIDEBAR */
.sidebar {
  position: fixed;
  top: var(--header-h);
  left: 0;
  bottom: 0;
  width: var(--sidebar-w);
  background: var(--bg2);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  z-index: 50;
  padding: 16px 0;
}

.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.toc-title {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 11px;
  font-weight: 700;
  color: var(--gold);
  text-transform: uppercase;
  letter-spacing: 2px;
  padding: 8px 20px 12px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 8px;
}

.toc-list { list-style: none; }

.toc-item { border-bottom: 1px solid rgba(42,42,80,0.3); }

.toc-link {
  display: block;
  padding: 7px 20px;
  text-decoration: none;
  font-size: 13px;
  color: var(--text2);
  transition: all 0.15s;
  border-left: 2px solid transparent;
  cursor: pointer;
}

.toc-link:hover {
  color: var(--text);
  background: rgba(188,0,51,0.05);
  border-left-color: var(--red);
}

.toc-link.active {
  color: var(--gold);
  border-left-color: var(--gold);
  background: rgba(200,150,46,0.05);
}

.toc-link.h2 { padding-left: 20px; font-weight: 500; }
.toc-link.h3 { padding-left: 36px; font-size: 12px; }
.toc-link.h4 { padding-left: 52px; font-size: 11px; }

/* MAIN */
.main {
  margin-left: var(--sidebar-w);
  margin-top: var(--header-h);
  flex: 1;
  padding: 32px 40px 80px;
  max-width: 960px;
}

/* CONTENT */
.content h1:first-child { margin-top: 0; }

.content h1, .content h2, .content h3, .content h4 {
  font-family: 'Noto Sans JP', sans-serif;
  margin-top: 1.6em;
  margin-bottom: 0.5em;
  line-height: 1.3;
  scroll-margin-top: 72px;
}

.content h1 {
  font-size: 26px;
  font-weight: 900;
  padding-bottom: 8px;
  border-bottom: 2px solid var(--red);
  color: var(--text);
}

.content h2 {
  font-size: 20px;
  font-weight: 700;
  color: var(--gold);
  padding-left: 10px;
  border-left: 3px solid var(--red);
}

.content h3 {
  font-size: 16px;
  font-weight: 700;
  color: var(--purple);
}

.content h4 {
  font-size: 14px;
  font-weight: 600;
  color: var(--text2);
}

.content p {
  margin-bottom: 0.9em;
  color: var(--text2);
  font-size: 14px;
}

.content strong { color: var(--text); font-weight:600; }
.content em { color: var(--gold2); }

.content a {
  color: var(--red2);
  text-decoration: none;
  border-bottom: 1px solid transparent;
}
.content a:hover { border-bottom-color: var(--red2); }

.content ul, .content ol {
  margin: 0.8em 0;
  padding-left: 24px;
  color: var(--text2);
  font-size: 14px;
}
.content li { margin-bottom: 0.4em; }

.content hr {
  border: none;
  border-top: 1px solid var(--border);
  margin: 2em 0;
}

.content code {
  font-family: 'JetBrains Mono', 'Fira Code', monospace;
  font-size: 12.5px;
  background: rgba(188,0,51,0.1);
  color: var(--gold2);
  padding: 1px 5px;
  border-radius: 3px;
}

.content pre {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px 20px;
  overflow-x: auto;
  margin: 1em 0;
}

.content pre code {
  background: none;
  color: var(--text);
  padding: 0;
  font-size: 12.5px;
  line-height: 1.5;
}

.content table {
  width: 100%;
  border-collapse: collapse;
  margin: 1em 0;
  font-size: 13px;
}

.content th {
  background: var(--bg3);
  color: var(--gold);
  font-weight: 600;
  padding: 8px 12px;
  text-align: left;
  border: 1px solid var(--border);
  font-family: 'Noto Sans JP', sans-serif;
}

.content td {
  padding: 8px 12px;
  border: 1px solid var(--border);
  color: var(--text2);
}

.content tr:hover td { background: var(--bg3); }

.content blockquote {
  border-left: 3px solid var(--red);
  padding: 10px 16px;
  margin: 1em 0;
  background: rgba(188,0,51,0.04);
  border-radius: 0 6px 6px 0;
  color: var(--text2);
  font-size: 14px;
}

/* SIDEBAR TOGGLE (mobile) */
.sidebar-toggle {
  display: none;
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 4px 12px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 18px;
}

/* LOADING */
.loading {
  text-align: center;
  padding: 80px 20px;
}

.spinner {
  width: 32px; height: 32px;
  border: 3px solid var(--border);
  border-top-color: var(--red);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  margin: 0 auto 12px;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* FOOTER */
.footer {
  text-align: center;
  padding: 24px;
  margin-top: 40px;
  border-top: 1px solid var(--border);
  color: var(--text3);
  font-size: 12px;
}
.footer a { color: var(--text2); text-decoration: none; }
.footer a:hover { color: var(--red); }

/* RESPONSIVE */
@media (max-width: 900px) {
  .sidebar {
    transform: translateX(-100%);
    transition: transform 0.25s ease;
    width: 260px;
  }
  .sidebar.open { transform: translateX(0); }
  .sidebar-toggle { display: block; }
  .main {
    margin-left: 0;
    padding: 24px 16px 60px;
  }
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-left">
    <button class="sidebar-toggle" id="sidebarToggle" onclick="toggleSidebar()">☰</button>
    <span class="logo">RP <span>AI</span></span>
  </div>
  <div class="lang-switch">
    <button class="lang-btn active" data-lang="tr" onclick="switchLang('tr')">TR</button>
    <button class="lang-btn" data-lang="en" onclick="switchLang('en')">EN</button>
  </div>
</header>

<!-- SIDEBAR -->
<nav class="sidebar" id="sidebar">
  <div class="toc-title" id="tocTitle">İÇİNDEKİLER</div>
  <ul class="toc-list" id="toc"></ul>
</nav>

<!-- MAIN -->
<main class="main">
  <div class="content" id="content">
    <div class="loading">
      <div class="spinner"></div>
      <p style="color:var(--text3);font-size:14px;">Yükleniyor...</p>
    </div>
  </div>
  <div class="footer">
    RP AI &bull; <a href="https://github.com/theayzek01/rp-ai-architecture-docs" target="_blank">GitHub</a>
  </div>
</main>

<script>
let currentLang = 'tr';
let tocData = [];

marked.setOptions({ breaks: true, gfm: true });

const renderer = new marked.Renderer();
const origHeading = renderer.heading.bind(renderer);
renderer.heading = function(text, level, raw) {
  const id = 's-' + raw.toLowerCase()
    .replace(/[^a-z0-9çğıöşüa-z ]/gi, '')
    .replace(/\s+/g, '-')
    .replace(/-+/g, '-')
    .replace(/^-|-$/g, '');
  return `<h${level} id="${id}">${text}</h${level}>`;
};

marked.use({ renderer });

async function loadContent(lang) {
  const el = document.getElementById('content');
  el.innerHTML = '<div class="loading"><div class="spinner"></div><p style="color:var(--text3);font-size:14px;">Yükleniyor...</p></div>';

  try {
    const file = lang === 'tr' ? 'content/tr.md' : 'content/en.md';
    const res = await fetch(file + '?t=' + Date.now());
    if (!res.ok) throw Error('HTTP ' + res.status);
    const md = await res.text();
    const html = marked.parse(md);
    el.innerHTML = html;

    buildTOC(lang);
    document.documentElement.lang = lang;
    updateActiveSection();

    document.getElementById('tocTitle').textContent =
      lang === 'tr' ? 'İÇİNDEKİLER' : 'CONTENTS';

  } catch (e) {
    el.innerHTML = '<div style="text-align:center;padding:40px;color:var(--red2);"><h2>Hata</h2><p style="color:var(--text3);font-size:13px;">'+e.message+'</p></div>';
  }
}

function buildTOC(lang) {
  const headings = document.querySelectorAll('.content h1, .content h2, .content h3, .content h4');
  const toc = document.getElementById('toc');
  toc.innerHTML = '';
  tocData = [];

  headings.forEach(h => {
    if (!h.id) return;
    const level = parseInt(h.tagName[1]);
    const text = h.textContent;
    tocData.push({ id: h.id, level, text });

    const li = document.createElement('li');
    li.className = 'toc-item';
    const a = document.createElement('a');
    a.className = 'toc-link h' + level;
    a.href = '#' + h.id;
    a.textContent = text;
    a.onclick = (e) => {
      e.preventDefault();
      document.getElementById(h.id).scrollIntoView({ behavior: 'smooth' });
      if (window.innerWidth <= 900) document.getElementById('sidebar').classList.remove('open');
    };
    li.appendChild(a);
    toc.appendChild(li);
  });
}

function updateActiveSection() {
  const links = document.querySelectorAll('.toc-link');
  if (!links.length) return;

  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        links.forEach(l => l.classList.remove('active'));
        const id = entry.target.id;
        const match = document.querySelector(`.toc-link[href="#${id}"]`);
        if (match) match.classList.add('active');
      }
    });
  }, { rootMargin: '-80px 0px -60% 0px' });

  document.querySelectorAll('.content h1, .content h2, .content h3').forEach(h => observer.observe(h));
}

function switchLang(lang) {
  if (lang === currentLang) return;
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
  loadContent(lang);
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

// Close sidebar on click outside
document.addEventListener('click', function(e) {
  const sidebar = document.getElementById('sidebar');
  const toggle = document.getElementById('sidebarToggle');
  if (window.innerWidth <= 900 && sidebar.classList.contains('open') &&
      !sidebar.contains(e.target) && !toggle.contains(e.target)) {
    sidebar.classList.remove('open');
  }
});

loadContent('tr');
</script>
</body>
</html>
