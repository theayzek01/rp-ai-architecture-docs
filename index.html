<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RP AI — System Architecture</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
:root {
  --bg: #ffffff;
  --bg2: #f7f8fa;
  --bg3: #eef0f4;
  --sidebar-bg: #1a1d23;
  --sidebar-text: #9ca3b0;
  --sidebar-text-active: #ffffff;
  --sidebar-hover: #2a2d35;
  --sidebar-border: #2a2d35;
  --text: #1a1d23;
  --text2: #4a4d55;
  --text3: #8a8d95;
  --border: #e2e4e8;
  --accent: #2563eb;
  --accent2: #3b82f6;
  --code-bg: #f4f5f7;
  --header-bg: rgba(255,255,255,0.95);
  --sidebar-w: 280px;
  --header-h: 56px;
}

* { margin:0; padding:0; box-sizing:border-box; }

html { scroll-behavior: smooth; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.7;
  font-size: 15px;
  display: flex;
  min-height: 100vh;
}

/* HEADER */
.header {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--header-h);
  background: var(--header-bg);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  z-index: 100;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 16px;
}

.logo {
  font-weight: 700;
  font-size: 16px;
  color: var(--text);
  letter-spacing: -0.3px;
}

.logo span { color: var(--accent); }

.lang-switch {
  display: flex;
  background: var(--bg2);
  border-radius: 6px;
  padding: 2px;
}

.lang-btn {
  padding: 5px 14px;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 500;
  background: transparent;
  color: var(--text3);
  transition: all 0.15s;
  font-family: inherit;
}

.lang-btn.active {
  background: var(--accent);
  color: #fff;
}

/* SIDEBAR */
.sidebar {
  position: fixed;
  top: var(--header-h);
  left: 0;
  bottom: 0;
  width: var(--sidebar-w);
  background: var(--sidebar-bg);
  overflow-y: auto;
  z-index: 50;
}

.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--sidebar-border); border-radius: 2px; }

.toc-header {
  padding: 16px 20px 12px;
  font-size: 11px;
  font-weight: 600;
  color: var(--sidebar-text);
  text-transform: uppercase;
  letter-spacing: 1.2px;
  border-bottom: 1px solid var(--sidebar-border);
  margin-bottom: 4px;
}

.toc-list { list-style: none; }

.toc-link {
  display: block;
  padding: 6px 20px;
  text-decoration: none;
  font-size: 13px;
  color: var(--sidebar-text);
  transition: all 0.12s;
  cursor: pointer;
  border-left: 2px solid transparent;
}

.toc-link:hover {
  color: var(--sidebar-text-active);
  background: var(--sidebar-hover);
}

.toc-link.active {
  color: #60a5fa;
  border-left-color: #60a5fa;
  background: rgba(37,99,235,0.08);
}

.toc-link.h2 { padding-left: 20px; }
.toc-link.h3 { padding-left: 36px; font-size: 12px; }
.toc-link.h4 { padding-left: 52px; font-size: 12px; }

/* MAIN */
.main {
  margin-left: var(--sidebar-w);
  margin-top: var(--header-h);
  flex: 1;
  padding: 40px 56px 100px;
  max-width: 960px;
}

/* CONTENT */
.content h1,
.content h2,
.content h3,
.content h4 {
  margin-top: 1.8em;
  margin-bottom: 0.5em;
  line-height: 1.35;
  scroll-margin-top: 72px;
  font-weight: 600;
}

.content h1:first-child { margin-top: 0; }

.content h1 {
  font-size: 28px;
  font-weight: 700;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
  letter-spacing: -0.5px;
}

.content h2 {
  font-size: 22px;
  font-weight: 600;
  color: var(--text);
  padding-bottom: 4px;
}

.content h3 {
  font-size: 17px;
  font-weight: 600;
  color: var(--text);
}

.content h4 {
  font-size: 15px;
  font-weight: 600;
  color: var(--text2);
}

.content p {
  margin-bottom: 1em;
  color: var(--text2);
}

.content strong { color: var(--text); font-weight: 600; }

.content a {
  color: var(--accent);
  text-decoration: none;
}

.content a:hover { text-decoration: underline; }

.content ul, .content ol {
  margin: 0.8em 0;
  padding-left: 24px;
  color: var(--text2);
}

.content li { margin-bottom: 0.35em; }

.content hr {
  border: none;
  border-top: 1px solid var(--border);
  margin: 2.5em 0;
}

.content code {
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  font-size: 13px;
  background: var(--code-bg);
  color: #e01e5a;
  padding: 1px 5px;
  border-radius: 3px;
}

.content pre {
  background: var(--code-bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px 20px;
  overflow-x: auto;
  margin: 1.2em 0;
}

.content pre code {
  background: none;
  color: var(--text);
  padding: 0;
  font-size: 13px;
  line-height: 1.55;
}

.content table {
  width: 100%;
  border-collapse: collapse;
  margin: 1.2em 0;
  font-size: 14px;
}

.content th {
  background: var(--bg2);
  color: var(--text);
  font-weight: 600;
  padding: 10px 14px;
  text-align: left;
  border: 1px solid var(--border);
}

.content td {
  padding: 10px 14px;
  border: 1px solid var(--border);
  color: var(--text2);
}

.content tr:hover td { background: var(--bg2); }

.content blockquote {
  border-left: 3px solid var(--accent);
  padding: 12px 20px;
  margin: 1.2em 0;
  background: var(--bg2);
  border-radius: 0 6px 6px 0;
  color: var(--text2);
}

/* TOC toggle (mobile) */
.toc-toggle {
  display: none;
  background: var(--bg2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 5px 10px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 15px;
  font-family: inherit;
}

/* LOADING */
.loading {
  text-align: center;
  padding: 80px 20px;
}

.spinner {
  width: 28px; height: 28px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  margin: 0 auto 12px;
}

@keyframes spin { to { transform: rotate(360deg); } }

.footer {
  text-align: center;
  padding: 32px 24px 0;
  margin-top: 48px;
  color: var(--text3);
  font-size: 12px;
}

.footer a { color: var(--accent); text-decoration: none; }
.footer a:hover { text-decoration: underline; }

/* RESPONSIVE */
@media (max-width: 900px) {
  .sidebar {
    transform: translateX(-100%);
    transition: transform 0.2s ease;
    width: 260px;
  }
  .sidebar.open { transform: translateX(0); }
  .toc-toggle { display: block; }
  .main { margin-left: 0; padding: 24px 20px 60px; }
}

@media (max-width: 600px) {
  .main { padding: 20px 16px 60px; }
  .content h1 { font-size: 22px; }
  .content h2 { font-size: 18px; }
}
</style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <button class="toc-toggle" id="tocToggle" onclick="toggleSidebar()">Menu</button>
    <span class="logo">RP <span>AI</span></span>
  </div>
  <div class="lang-switch">
    <button class="lang-btn active" data-lang="tr" onclick="switchLang('tr')">TR</button>
    <button class="lang-btn" data-lang="en" onclick="switchLang('en')">EN</button>
  </div>
</header>

<nav class="sidebar" id="sidebar">
  <div class="toc-header" id="tocTitle">ICINDEKILER</div>
  <ul class="toc-list" id="toc"></ul>
</nav>

<main class="main">
  <div class="content" id="content">
    <div class="loading">
      <div class="spinner"></div>
      <p style="color:var(--text3);font-size:14px;">Yukleniyor...</p>
    </div>
  </div>
  <div class="footer">
    <a href="https://github.com/theayzek01/rp-ai-architecture-docs" target="_blank">GitHub</a>
  </div>
</main>

<script>
let currentLang = 'tr';

marked.setOptions({ breaks: true, gfm: true });

const renderer = new marked.Renderer();
renderer.heading = function() {
  var t = arguments[0];
  var hText = (typeof t === 'object' && t !== null) ? (t.text || '') : t;
  var hLevel = (typeof t === 'object' && t !== null) ? t.depth : arguments[1];
  var hRaw = (typeof t === 'object' && t !== null) ? (t.raw || hText) : (arguments[2] || hText);
  var id = 's-' + hRaw.toLowerCase()
    .replace(/[^a-z0-9cgiou ]/gi, '')
    .replace(/\s+/g, '-')
    .replace(/-+/g, '-')
    .replace(/^-|-$/g, '');
  return '<h' + hLevel + ' id="' + id + '">' + hText + '</h' + hLevel + '>';
};

marked.use({ renderer });

async function loadContent(lang) {
  const el = document.getElementById('content');
  el.innerHTML = '<div class="loading"><div class="spinner"></div><p style="color:var(--text3);font-size:14px;">Yukleniyor...</p></div>';

  try {
    const file = lang === 'tr' ? 'content/tr.md' : 'content/en.md';
    const res = await fetch(file + '?t=' + Date.now());
    if (!res.ok) throw Error('HTTP ' + res.status);
    const md = await res.text();
    const html = marked.parse(md);
    el.innerHTML = html;

    buildTOC(lang);
    document.documentElement.lang = lang;
    setupScrollSpy();

    document.getElementById('tocTitle').textContent =
      lang === 'tr' ? 'ICINDEKILER' : 'CONTENTS';

  } catch (e) {
    el.innerHTML = '<div style="text-align:center;padding:40px;color:var(--accent);"><h2>Error</h2><p style="color:var(--text3);font-size:13px;">' + e.message + '</p></div>';
  }
}

function buildTOC(lang) {
  const headings = document.querySelectorAll('.content h1, .content h2, .content h3');
  const toc = document.getElementById('toc');
  toc.innerHTML = '';

  headings.forEach(function(h) {
    if (!h.id) return;
    var level = parseInt(h.tagName[1]);
    if (level === 1) return;

    var li = document.createElement('li');
    var a = document.createElement('a');
    a.className = 'toc-link h' + level;
    a.href = '#' + h.id;
    a.textContent = h.textContent;
    a.onclick = function(e) {
      e.preventDefault();
      document.getElementById(h.id).scrollIntoView({ behavior: 'smooth' });
      if (window.innerWidth <= 900) document.getElementById('sidebar').classList.remove('open');
    };
    li.appendChild(a);
    toc.appendChild(li);
  });
}

function setupScrollSpy() {
  var links = document.querySelectorAll('.toc-link');
  if (!links.length) return;

  var headings = document.querySelectorAll('.content h2, .content h3');
  if (!headings.length) return;

  function update() {
    var scrollY = window.scrollY + 80;
    var current = null;

    headings.forEach(function(h) {
      if (h.offsetTop <= scrollY) {
        current = h.id;
      }
    });

    links.forEach(function(l) {
      l.classList.toggle('active', l.getAttribute('href') === '#' + current);
    });
  }

  window.addEventListener('scroll', update, { passive: true });
  update();
}

function switchLang(lang) {
  if (lang === currentLang) return;
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(function(b) {
    b.classList.toggle('active', b.dataset.lang === lang);
  });
  loadContent(lang);
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

document.addEventListener('click', function(e) {
  var sidebar = document.getElementById('sidebar');
  var toggle = document.getElementById('tocToggle');
  if (window.innerWidth <= 900 && sidebar.classList.contains('open') &&
      !sidebar.contains(e.target) && !toggle.contains(e.target)) {
    sidebar.classList.remove('open');
  }
});

loadContent('tr');
</script>
</body>
</html>
